<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' | College ERP' : 'College ERP'}">College ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body data-theme="light">
<div class="app-wrapper">
    <nav class="sidebar glass-panel" id="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-mortarboard-fill text-primary"></i>
            <span>College ERP</span>
        </div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/dashboard}" class="nav-link"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
            <li sec:authorize="hasAnyRole('ADMIN','TEACHER')"><a th:href="@{/students}" class="nav-link"><i class="bi bi-people"></i> Students</a></li>
            <li sec:authorize="hasAnyRole('ADMIN','TEACHER')"><a th:href="@{/attendance}" class="nav-link"><i class="bi bi-calendar-check"></i> Attendance</a></li>
            <li><a th:href="@{/marks}" class="nav-link"><i class="bi bi-award"></i> Marks</a></li>
            <li sec:authorize="hasAnyRole('ADMIN','TEACHER')"><a th:href="@{/courses}" class="nav-link"><i class="bi bi-book"></i> Courses</a></li>
            <li sec:authorize="hasAnyRole('ADMIN','TEACHER')"><a th:href="@{/predictions}" class="nav-link"><i class="bi bi-cpu"></i> AI Predictions</a></li>
        </ul>
    </nav>
    <div class="main-content">
        <header class="topbar glass-panel">
            <button class="btn btn-link d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
            <h5 class="mb-0" th:text="${pageTitle}">Page</h5>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-secondary" id="themeToggle"><i class="bi bi-moon-stars"></i></button>
                <form th:action="@{/logout}" method="post"><button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i></button></form>
            </div>
        </header>
        <main class="content-area">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show"><span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show"><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
            <th:block th:replace="${content}"/>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
