<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main :: layout(~{::section})}">
<section>
    <div class="glass-panel p-4 mb-4">
        <h6><i class="bi bi-cpu"></i> AI Performance Prediction</h6>
        <form method="get" class="row g-2">
            <div class="col-md-8"><select name="studentId" class="form-select">
                <option value="">Select Student</option>
                <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.firstName + ' ' + s.lastName + ' (' + s.studentId + ')'}"
                        th:selected="${selectedStudentId == s.id}"></option>
            </select></div>
            <div class="col-md-4"><button type="submit" class="btn btn-primary w-100">Analyze</button></div>
        </form>
    </div>
    <div th:if="${prediction}" class="row g-4">
        <div class="col-md-4"><div class="glass-panel p-4 text-center">
            <p class="text-muted">Predicted Grade</p>
            <h1 class="text-primary" th:text="${prediction.predictedGrade}">A</h1>
            <h3 th:text="${prediction.predictedPercentage + '%'}">85%</h3>
            <small class="text-muted">Confidence: <span th:text="${prediction.confidenceScore}"></span>%</small>
        </div></div>
        <div class="col-md-8"><div class="glass-panel p-4">
            <h6>Recommendation</h6>
            <p th:text="${prediction.recommendation}"></p>
            <h6 class="mt-3">Factors</h6>
            <ul><li th:each="entry : ${prediction.factors}" th:text="${entry.key + ': ' + entry.value}"></li></ul>
        </div></div>
    </div>
</section>
</html>
