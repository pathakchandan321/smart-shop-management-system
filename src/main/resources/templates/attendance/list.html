<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main :: layout(~{::section})}">
<section>
    <div class="glass-panel p-4 mb-4">
        <h6>Mark Attendance</h6>
        <form th:action="@{/attendance/mark}" method="post" class="row g-2">
            <div class="col-md-3">
                <select name="studentId" class="form-select" required>
                    <option value="">Select Student</option>
                    <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.firstName + ' ' + s.lastName + ' (' + s.studentId + ')'}"></option>
                </select>
            </div>
            <div class="col-md-3"><select name="subjectId" class="form-select"><option th:each="s : ${subjects}" th:value="${s.id}" th:text="${s.subjectName}"></option></select></div>
            <div class="col-md-3"><select name="status" class="form-select"><option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option></select></div>
            <div class="col-md-3"><button type="submit" class="btn btn-primary w-100">Mark</button></div>
        </form>
    </div>
    <div class="table-glass">
        <table class="table mb-0"><thead><tr><th>Date</th><th>Student</th><th>Subject</th><th>Status</th></tr></thead>
        <tbody><tr th:each="a : ${attendance.content}">
            <td th:text="${a.attendanceDate}"></td>
            <td th:text="${a.student.firstName + ' ' + a.student.lastName}"></td>
            <td th:text="${a.subject.subjectName}"></td>
            <td><span class="badge bg-primary" th:text="${a.status}"></span></td>
        </tr></tbody></table>
    </div>
</section>
</html>
