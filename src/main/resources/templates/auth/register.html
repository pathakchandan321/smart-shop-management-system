<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register | College ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div class="login-page">
    <div class="login-card glass-panel">
        <h3 class="text-center mb-4">Create Account</h3>
        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <div class="mb-3"><label class="form-label">First Name</label><input th:field="*{firstName}" class="form-control" required/></div>
            <div class="mb-3"><label class="form-label">Last Name</label><input th:field="*{lastName}" class="form-control" required/></div>
            <div class="mb-3"><label class="form-label">Email</label><input th:field="*{email}" type="email" class="form-control" required/></div>
            <div class="mb-3"><label class="form-label">Password</label><input th:field="*{password}" type="password" class="form-control" required/></div>
            <div class="mb-3"><label class="form-label">Role</label>
                <select th:field="*{role}" class="form-select"><option value="STUDENT">Student</option><option value="TEACHER">Teacher</option></select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        <p class="text-center mt-3"><a th:href="@{/login}">Back to login</a></p>
    </div>
</div>
</body>
</html>
