<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | College ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div class="login-page">
    <div class="login-card glass-panel">
        <div class="text-center mb-4">
            <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
            <h2 class="mt-2">College ERP</h2>
            <p class="text-muted">Student Management System</p>
        </div>
        <div th:if="${param.error}" class="alert alert-danger">Invalid email or password</div>
        <div th:if="${param.logout}" class="alert alert-success">You have been logged out</div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="username" class="form-control" placeholder="admin@college.edu" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
        </form>
        <p class="text-center mt-3"><a th:href="@{/register}">Create an account</a></p>
        <div class="mt-3 p-3 bg-light rounded small text-muted">
            <strong>Demo:</strong> admin@college.edu / Admin@123
        </div>
    </div>
</div>
</body>
</html>
