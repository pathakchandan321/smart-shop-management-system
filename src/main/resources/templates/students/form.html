<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/main :: layout(~{::section})}">
<section>
    <form th:action="${studentId != null} ? @{/students/{id}(id=${studentId})} : @{/students}"
          method="post" enctype="multipart/form-data" class="glass-panel p-4">
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Student ID</label><input name="studentId" th:value="${student.studentId}" class="form-control" required/></div>
            <div class="col-md-6"><label class="form-label">Email</label><input name="email" type="email" th:value="${student.email}" class="form-control" required/></div>
            <div class="col-md-6"><label class="form-label">First Name</label><input name="firstName" th:value="${student.firstName}" class="form-control" required/></div>
            <div class="col-md-6"><label class="form-label">Last Name</label><input name="lastName" th:value="${student.lastName}" class="form-control" required/></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input name="phone" th:value="${student.phone}" class="form-control"/></div>
            <div class="col-md-6">
                <label class="form-label">Course</label>
                <select name="courseId" class="form-select">
                    <option value="">Select</option>
                    <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.courseName}" th:selected="${c.id == student.courseId}"></option>
                </select>
            </div>
            <div class="col-md-6"><label class="form-label">Semester</label><input name="semester" type="number" th:value="${student.semester}" class="form-control"/></div>
            <div class="col-md-6"><label class="form-label">Photo</label><input type="file" name="photo" class="form-control" accept="image/*"/></div>
            <div th:if="${studentId == null}" class="col-12">
                <div class="form-check"><input type="checkbox" name="createUser" class="form-check-input"/><label class="form-check-label">Create login account</label></div>
            </div>
        </div>
        <div class="mt-4"><button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/students}" class="btn btn-secondary ms-2">Cancel</a></div>
    </form>
</section>
</html>
