<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/main :: layout(~{::section})}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <p class="text-muted mb-0">Manage student registrations</p>
        <div class="d-flex gap-2">
            <a th:href="@{/students/export/pdf}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-file-pdf"></i> PDF</a>
            <a th:href="@{/students/export/excel}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-file-excel"></i> Excel</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/students/new}" class="btn btn-primary btn-sm"><i class="bi bi-plus"></i> Add Student</a>
        </div>
    </div>
    <form method="get" class="glass-panel p-3 mb-4 row g-2">
        <div class="col-md-4"><input type="text" name="search" th:value="${search}" class="form-control" placeholder="Search..."/></div>
        <div class="col-md-3">
            <select name="courseId" class="form-select">
                <option value="">All Courses</option>
                <option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.courseName}"></option>
            </select>
        </div>
        <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Filter</button></div>
    </form>
    <div class="table-glass">
        <table class="table table-hover mb-0">
            <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Course</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
                <tr th:each="s : ${students.content}">
                    <td th:text="${s.studentId}"></td>
                    <td th:text="${s.firstName + ' ' + s.lastName}"></td>
                    <td th:text="${s.email}"></td>
                    <td th:text="${s.courseName} ?: 'N/A'"></td>
                    <td><span class="badge bg-success" th:text="${s.status}"></span></td>
                    <td>
                        <a sec:authorize="hasRole('ADMIN')" th:href="@{/students/{id}/edit(id=${s.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></a>
                        <form sec:authorize="hasRole('ADMIN')" th:action="@{/students/{id}/delete(id=${s.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <nav th:if="${students.totalPages > 1}" class="mt-3">
        <ul class="pagination">
            <li class="page-item" th:classappend="${students.first} ? 'disabled'">
                <a class="page-link" th:href="@{/students(page=${students.number - 1}, search=${search})}">Prev</a>
            </li>
            <li class="page-item disabled"><span class="page-link" th:text="${students.number + 1} + ' / ' + ${students.totalPages}"></span></li>
            <li class="page-item" th:classappend="${students.last} ? 'disabled'">
                <a class="page-link" th:href="@{/students(page=${students.number + 1}, search=${search})}">Next</a>
            </li>
        </ul>
    </nav>
</section>
</html>
